name: Archive BuilderPulse ZH + DingTalk

on:
  schedule:
    - cron: "0 1 * * *" # UTC 01:00 = 北京时间每天 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest ZH markdowns (lookback 10 days)
        run: |
          python - <<'PY'
          import json, base64, urllib.request, urllib.error
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          UPSTREAM_REPO = "BuilderPulse/BuilderPulse"
          LOOKBACK_DAYS = 10
          ARCHIVE_DIR = Path("content/builderpulse/zh")
          STATE_DIR = Path(".state")
          CHANGED_JSON = STATE_DIR / "changed_files.json"

          ARCHIVE_DIR.mkdir(parents=True, exist_ok=True)
          STATE_DIR.mkdir(parents=True, exist_ok=True)

          def get_upstream_md(path: str):
              api = f"https://api.github.com/repos/{UPSTREAM_REPO}/contents/{path}"
              req = urllib.request.Request(api, headers={"User-Agent": "github-actions"})
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return None
                  raise

              content_b64 = data.get("content", "")
              if not content_b64:
                  return None
              return base64.b64decode(content_b64).decode("utf-8", errors="ignore")

          now_cn = datetime.now(timezone(timedelta(hours=8)))
          changed = []

          dates = [now_cn - timedelta(days=i) for i in range(LOOKBACK_DAYS - 1, -1, -1)]
          for d in dates:
              ds = d.strftime("%Y-%m-%d")
              year = d.strftime("%Y")
              upstream_path = f"zh/{year}/{ds}.md"

              content = get_upstream_md(upstream_path)
              if content is None:
                  continue

              normalized = content.rstrip() + "\n"
              local_path = ARCHIVE_DIR / f"{ds}.md"

              old = None
              if local_path.exists():
                  old = local_path.read_text(encoding="utf-8", errors="ignore").rstrip() + "\n"

              if old != normalized:
                  local_path.write_text(normalized, encoding="utf-8")
                  changed.append({
                      "date": ds,
                      "local_path": str(local_path).replace("\\", "/"),
                      "upstream_url": f"https://github.com/{UPSTREAM_REPO}/blob/main/{upstream_path}"
                  })

          CHANGED_JSON.write_text(json.dumps(changed, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"Changed files: {len(changed)}")
          PY

      - name: Commit & push archive updates
        id: commit
        run: |
          # 先 add，确保新文件也能被检测到
          git add content/builderpulse/zh .state/changed_files.json

          # 用 cached diff 判断（可检测 untracked/new files）
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No archive changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: archive BuilderPulse zh daily markdown"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Notify DingTalk
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
          DING_SECRET: ${{ secrets.DING_SECRET }}
          DING_KEYWORD: ${{ secrets.DING_KEYWORD }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os, json, time, hmac, hashlib, base64, urllib.request, urllib.parse
          from pathlib import Path

          webhook = (os.getenv("DING_WEBHOOK") or "").strip()
          if not webhook:
              raise SystemExit("Missing DING_WEBHOOK secret")

          changed_path = Path(".state/changed_files.json")
          changed = []
          if changed_path.exists():
              changed = json.loads(changed_path.read_text(encoding="utf-8"))

          manual_run = (os.getenv("EVENT_NAME") == "workflow_dispatch")

          server = os.getenv("GITHUB_SERVER_URL", "https://github.com").rstrip("/")
          repo = os.getenv("GITHUB_REPOSITORY", "").strip()
          ref_name = os.getenv("GITHUB_REF_NAME", "main").strip()

          lines = []
          title = "BuilderPulse 中文日报归档通知"

          if changed:
              show = changed[-8:]
              for item in show:
                  archived_url = f"{server}/{repo}/blob/{ref_name}/{item['local_path']}"
                  lines.append(f"- {item['date']}：[归档链接]({archived_url})｜[源链接]({item['upstream_url']})")
              if len(changed) > 8:
                  lines.append(f"- 其余 {len(changed)-8} 条已归档到仓库")
              header = f"已同步 **{len(changed)}** 篇"
          else:
              if not manual_run:
                  print("No changes and not manual run, skip notify.")
                  raise SystemExit(0)

              files = sorted(Path("content/builderpulse/zh").glob("*.md"))
              if files:
                  latest = files[-1]
                  date = latest.stem
                  y = date[:4]
                  local_path = str(latest).replace("\\", "/")
                  archived_url = f"{server}/{repo}/blob/{ref_name}/{local_path}"
                  upstream_url = f"https://github.com/BuilderPulse/BuilderPulse/blob/main/zh/{y}/{date}.md"
                  lines.append(f"- 最新归档：[归档链接]({archived_url})｜[源链接]({upstream_url})")
                  header = f"手动触发：今日无新增，发送最近一期（{date}）"
              else:
                  header = "手动触发：当前仓库还没有归档文件"

          keyword = (os.getenv("DING_KEYWORD") or "").strip()
          prefix = (keyword + "\n") if keyword else ""

          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": title,
                  "text": f"{prefix}### {title}\n\n{header}\n\n" + ("\n".join(lines) if lines else "")
              }
          }

          secret = (os.getenv("DING_SECRET") or "").strip()
          if secret:
              ts = str(int(time.time() * 1000))
              sign_str = f"{ts}\n{secret}".encode("utf-8")
              sign = urllib.parse.quote_plus(
                  base64.b64encode(hmac.new(secret.encode("utf-8"), sign_str, hashlib.sha256).digest())
              )
              sep = "&" if "?" in webhook else "?"
              webhook = f"{webhook}{sep}timestamp={ts}&sign={sign}"

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              print("DingTalk:", resp.read().decode("utf-8", errors="ignore"))
          PY
