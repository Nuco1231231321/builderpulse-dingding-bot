name: BuilderPulse ZH Link -> DingTalk

on:
  schedule:
    - cron: "30 3 * * *" # 北京时间每天 11:30（UTC+8）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find latest zh daily and send link
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
          DING_SECRET: ${{ secrets.DING_SECRET }}
          DING_KEYWORD: ${{ secrets.DING_KEYWORD }}
        run: |
          python - <<'PY'
          import os, json, time, hmac, hashlib, base64
          import urllib.request, urllib.parse, urllib.error
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          REPO = "BuilderPulse/BuilderPulse"
          STATE = Path(".state/last_zh_daily_date.txt")

          def find_daily():
              now_cn = datetime.now(timezone(timedelta(hours=8)))
              for i in range(0, 3):  # 今天/昨天/前天
                  d = now_cn - timedelta(days=i)
                  ds = d.strftime("%Y-%m-%d")
                  y = d.strftime("%Y")
                  api = f"https://api.github.com/repos/{REPO}/contents/zh/{y}/{ds}.md"
                  req = urllib.request.Request(api, headers={"User-Agent": "actions"})
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          if r.status == 200:
                              url = f"https://github.com/{REPO}/blob/main/zh/{y}/{ds}.md"
                              return ds, url
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          continue
                      raise
              return None, None

          webhook = (os.getenv("DING_WEBHOOK") or "").strip()
          if not webhook:
              raise SystemExit("Missing DING_WEBHOOK")

          ds, url = find_daily()
          if not url:
              print("No zh daily found.")
              raise SystemExit(0)

          last = STATE.read_text(encoding="utf-8").strip() if STATE.exists() else ""
          if last == ds:
              print(f"Already sent: {ds}")
              raise SystemExit(0)

          keyword = (os.getenv("DING_KEYWORD") or "").strip()
          prefix = (keyword + "\n") if keyword else ""
          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": f"BuilderPulse 中文日报 {ds}",
                  "text": f"{prefix}### BuilderPulse 中文日报 {ds}\n\n- [点击查看日报]({url})"
              }
          }

          secret = (os.getenv("DING_SECRET") or "").strip()
          if secret:
              ts = str(int(time.time() * 1000))
              sign_str = f"{ts}\n{secret}".encode("utf-8")
              sign = urllib.parse.quote_plus(
                  base64.b64encode(hmac.new(secret.encode("utf-8"), sign_str, hashlib.sha256).digest())
              )
              sep = "&" if "?" in webhook else "?"
              webhook = f"{webhook}{sep}timestamp={ts}&sign={sign}"

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=20) as r:
              print("DingTalk:", r.read().decode("utf-8", errors="ignore"))

          STATE.parent.mkdir(parents=True, exist_ok=True)
          STATE.write_text(ds, encoding="utf-8")
          print("Saved:", ds)
          PY

      - name: Commit state
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/last_zh_daily_date.txt
          git commit -m "chore: update last zh daily date"
          git push
